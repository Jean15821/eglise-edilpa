<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDILPA - Inscription</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a2a,#1a1a4e);color:white;font-family:Arial,sans-serif}
.header{background:#0a0a2a;padding:20px;text-align:center}
.logo{font-size:24px;color:#ffd700}
.container{max-width:500px;margin:auto;padding:20px}
.form-box{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:white}
label{color:#ffd700;font-weight:bold}
.btn{background:#ffd700;color:#0a0a2a;padding:15px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;width:100%}
.footer{text-align:center;padding:20px;background:#050510;margin-top:30px}
.info{background:rgba(255,215,0,0.1);border-radius:10px;padding:15px;margin-top:20px;text-align:center;font-size:14px}
</style>
</head>
<body>
<div class="header"><div class="logo">🏛️ ÉGLISE DE DIEU<br>LIBERTÉ PAR LA PAROLE INC.</div></div>

<div class="container">
<div class="form-box">
<h2 style="text-align:center;color:#ffd700;margin-bottom:20px">📝 INSCRIPTION MEMBRE</h2>

<form action="https://formspree.io/f/xgvovqdp" method="POST">
<input type="hidden" name="_cc" value="walkyjean@gmail.com, jeancharies809@gmail.com, secretaire@edilpa.org">

<input type="text" name="nom" placeholder="👤 NOM" required>
<input type="text" name="prenom" placeholder="👤 PRÉNOM" required>
<input type="text" name="adresse" placeholder="🏠 ADRESSE" required>
<select name="etat_civil" required><option>💍 ÉTAT CIVIL</option><option>Célibataire</option><option>Marié(e)</option><option>Divorcé(e)</option><option>Veuf/Veuve</option></select>
<input type="tel" name="telephone" placeholder="📞 TÉLÉPHONE" required>
<input type="email" name="email" placeholder="📧 EMAIL">
<input type="text" name="pasteur" placeholder="🙏 PASTEUR RESPONSABLE">
<input type="text" name="carte_no" placeholder="🆔 CARTE N°">
<select name="service"><option>🎯 SERVICE SOUHAITÉ</option><option>Évangélisation</option><option>Louange</option><option>Prière</option><option>Jeunesse</option><option>Accueil</option></select>
<textarea name="message" rows="3" placeholder="📝 MESSAGE"></textarea>

<button type="submit" class="btn">✅ S'INSCRIRE</button>
</form>

<div class="info">
📌 Conférence Jeunesse 2026 : 28 Juin - 8h30 - 2,500 Gdes<br>
📞 509 3226 6392 | 📧 jeancharies809@gmail.com
</div>
</div>
</div>

<div class="footer"><p>© 2025 - EDILPA</p></div>
</body>
</html>
