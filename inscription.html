<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDILPA - Inscription Membre</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a2a,#1a1a4e);color:white;font-family:Arial,sans-serif}
.header{background:#0a0a2a;padding:20px;text-align:center}
.logo{font-size:22px;color:#ffd700}
.container{max-width:800px;margin:auto;padding:20px}
.form-box{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px}
h2{text-align:center;color:#ffd700;margin-bottom:25px}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:white;font-size:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.btn{background:#ffd700;color:#0a0a2a;padding:15px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;width:100%}
.footer{text-align:center;padding:30px;background:#050510;margin-top:40px}
</style>
</head>
<body>
<div class="header"><div class="logo">🏛️ ÉGLISE DE DIEU LIBERTÉ PAR LA PAROLE INC.</div></div>

<div class="container">
<div class="form-box">
<h2>📝 FORMULAIRE D'INSCRIPTION</h2>
<p style="text-align:center;margin-bottom:20px">Tous les champs sont facultatifs</p>

<form id="form">
<div class="row">
<input type="text" id="nom" placeholder="👤 NOM">
<input type="text" id="prenom" placeholder="👤 PRÉNOM">
</div>
<input type="text" id="adresse" placeholder="🏠 ADRESSE">
<div class="row">
<select id="etat_civil"><option>💍 ÉTAT CIVIL</option><option>Célibataire</option><option>Marié(e)</option><option>Divorcé(e)</option><option>Veuf/Veuve</option></select>
<input type="tel" id="telephone" placeholder="📞 TÉLÉPHONE">
</div>
<div class="row">
<input type="email" id="email" placeholder="📧 EMAIL">
<input type="text" id="carte_no" placeholder="🆔 CARTE N°">
</div>

<select id="pasteur">
<option>🙏 PASTEUR RESPONSABLE</option>
<option>Booze Calixte</option>
<option>Odilna Belizaire</option>
<option>Jhonny Surlin</option>
<option>Erick Zidor</option>
<option>Ardine Vincent</option>
<option>Dieu el JN Baptiste</option>
<option>Winsa Jean</option>
<option>Filomena Louis</option>
<option>Garius M.</option>
<option>Saintil S.</option>
<option>Richard Cilin</option>
<option>Sonthonax</option>
<option>Esnel B.</option>
<option>Maxene M.</option>
<option>Autre pasteur</option>
</select>

<select id="service">
<option>🎯 SERVICE SOUHAITÉ</option>
<option>Évangélisation</option><option>Louange</option><option>Prière</option>
<option>Jeunesse</option><option>Femmes</option><option>Hommes</option>
<option>Accueil</option><option>Technique</option><option>École Biblique</option>
</select>

<textarea id="message" rows="3" placeholder="📝 MESSAGE / DEMANDE / TESTIMONAGE"></textarea>

<button type="submit" class="btn">✅ ENVOYER PAR WHATSAPP</button>
<div id="msg" style="margin-top:15px;text-align:center"></div>
</form>
</div>
</div>

<div class="footer"><p>📞 509 3226 6392 | 📧 jeancharies809@gmail.com</p><p>📍 Rue Polyte, Mombin Crochu, Haïti</p></div>

<script>
document.getElementById('form').addEventListener('submit', function(e) {
e.preventDefault();
const nom=document.getElementById('nom').value||'Non fourni';
const prenom=document.getElementById('prenom').value||'Non fourni';
const adresse=document.getElementById('adresse').value||'Non fourni';
const etat_civil=document.getElementById('etat_civil').value;
const telephone=document.getElementById('telephone').value||'Non fourni';
const email=document.getElementById('email').value||'Non fourni';
const carte_no=document.getElementById('carte_no').value||'Non fourni';
const pasteur=document.getElementById('pasteur').value;
const service=document.getElementById('service').value;
const message=document.getElementById('message').value||'Aucun message';
let texte=`📌 *NOUVELLE INSCRIPTION EDILPA*%0A`;
texte+=`👤 ${nom} ${prenom}%0A`;
texte+=`🏠 ${adresse}%0A`;
texte+=`💍 ${etat_civil}%0A`;
texte+=`📞 ${telephone}%0A`;
texte+=`📧 ${email}%0A`;
texte+=`🆔 ${carte_no}%0A`;
texte+=`🙏 ${pasteur}%0A`;
texte+=`🎯 ${service}%0A`;
texte+=`📝 ${message}%0A`;
texte+=`⛪ Église de Dieu Liberté par la Parole INC.`;
window.open(`https://wa.me/50932266392?text=${texte}`,'_blank');
document.getElementById('msg').innerHTML='✅ Message WhatsApp ouvert !';
setTimeout(()=>document.getElementById('msg').innerHTML='',3000);
});
</script>
</body>
</html>
