<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDILPA - Inscription</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a2a,#1a1a4e);color:white;font-family:Arial,sans-serif}
.header{background:#0a0a2a;padding:20px;text-align:center;border-bottom:2px solid #ffd700}
.logo{font-size:20px;color:#ffd700}
.container{max-width:700px;margin:auto;padding:20px}
.form-box{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px}
h2{text-align:center;color:#ffd700;margin-bottom:25px}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:white;font-size:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.btn-wa{background:#25D366;color:white;padding:16px;border:none;border-radius:10px;font-weight:bold;font-size:18px;cursor:pointer;width:100%;margin-top:20px}
.btn-wa:hover{opacity:0.9}
.footer{text-align:center;padding:30px;background:#050510;margin-top:40px}
.info{background:rgba(255,215,0,0.1);border-radius:15px;padding:20px;margin-top:25px;text-align:center;font-size:13px}
</style>
</head>
<body>
<div class="header"><div class="logo">🏛️ ÉGLISE DE DIEU LIBERTÉ PAR LA PAROLE INC.<br>✝️ EDILPA ✝️</div></div>

<div class="container">
<div class="form-box">
<h2>📝 FORMULAIRE D'INSCRIPTION</h2>

<div class="row">
<input type="text" id="nom" placeholder="👤 NOM" required>
<input type="text" id="prenom" placeholder="👤 PRÉNOM" required>
</div>
<input type="text" id="adresse" placeholder="🏠 ADRESSE" required>
<div class="row">
<select id="etat_civil"><option>💍 ÉTAT CIVIL</option><option>Célibataire</option><option>Marié(e)</option><option>Divorcé(e)</option></select>
<input type="tel" id="telephone" placeholder="📞 TÉLÉPHONE" required>
</div>
<div class="row">
<input type="email" id="email" placeholder="📧 EMAIL">
<input type="text" id="pasteur" placeholder="🙏 PASTEUR">
</div>
<div class="row">
<input type="text" id="carte_no" placeholder="🆔 CARTE N°">
<select id="service"><option>🎯 SERVICE</option><option>Évangélisation</option><option>Louange</option><option>Prière</option><option>Jeunesse</option><option>Accueil</option></select>
</div>
<textarea id="message" rows="3" placeholder="📝 MESSAGE"></textarea>

<button class="btn-wa" id="envoyerWA">📱 ENVOYER PAR WHATSAPP</button>

<div class="info">
📌 Conférence Jeunesse 2026 : 28 Juin - 8h30 - 2,500 Gdes<br>
📞 509 3226 6392 | 📧 jeancharies809@gmail.com<br>
✅ Les données seront envoyées directement sur WhatsApp
</div>
</div>
</div>

<div class="footer"><p>© 2025 - Église de Dieu Liberté par la Parole INC.</p></div>

<script>
document.getElementById('envoyerWA').addEventListener('click', function() {
const nom = document.getElementById('nom').value;
const prenom = document.getElementById('prenom').value;
const adresse = document.getElementById('adresse').value;
const etat_civil = document.getElementById('etat_civil').value;
const telephone = document.getElementById('telephone').value;
const email = document.getElementById('email').value;
const pasteur = document.getElementById('pasteur').value;
const carte_no = document.getElementById('carte_no').value;
const service = document.getElementById('service').value;
const message = document.getElementById('message').value;

if(!nom || !prenom || !adresse || !telephone) {
alert('Veuillez remplir les champs obligatoires: Nom, Prénom, Adresse, Téléphone');
return;
}

const texte = `📌 *NOUVELLE INSCRIPTION EDILPA*
━━━━━━━━━━━━━━━━━━━━━
👤 *Nom:* ${nom} ${prenom}
🏠 *Adresse:* ${adresse}
💍 *État civil:* ${etat_civil}
📞 *Téléphone:* ${telephone}
📧 *Email:* ${email || 'Non fourni'}
🙏 *Pasteur:* ${pasteur || 'Non fourni'}
🆔 *Carte N°:* ${carte_no || 'Non fourni'}
🎯 *Service:* ${service}
📝 *Message:* ${message || 'Aucun message'}
━━━━━━━━━━━━━━━━━━━━━
⛪ Église de Dieu Liberté par la Parole INC.
📅 ${new Date().toLocaleString('fr-FR')}`;

const numero = "50932266392";
const url = `https://wa.me/${numero}?text=${encodeURIComponent(texte)}`;
window.open(url, '_blank');
});
</script>
</body>
</html>
